
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>Generate Code</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
<link href="/static/css/bootstrap.min.css" rel="stylesheet">

<style>

.contact form{
max-width:1000px;
margin:0 auto;
padding:20px;
border-radius:8px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.contact textarea{
width:100%;
height:200px;
border-radius:5px;
padding:10px;
font-size:16px;
border:1px solid lightblue;
background-color:lightblue;
}

.contact select{
width:100%;
height:40px;
border-radius:5px;
padding:10px;
font-size:16px;
border:1px solid #ced4da;
background-color:lightgrey;
}

.contact button{
width:100%;
height:45px;
border-radius:5px;
background-color:#007bff;
color:white;
font-size:16px;
border:none;
}

.result-box{
background:white;
padding:15px;
border-radius:6px;
border-left:5px solid #007bff;
font-family:monospace;
white-space:pre-wrap;
margin-top:20px;
}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="{% url 'submit_code' %}">
Enhanced Code Analysis and Feedback System
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'submit_code' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'generate_code' %}">Generate Code</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'analyze_code' %}">Analyze Code</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'profile' %}">Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'index' %}">Logout</a>
</li>

</ul>

</div>

</div>

</nav>

<section class="contact py-5">

<div class="container">

<h2 class="text-center">Generate Code</h2>

<form method="POST" action="{% url 'generate_code' %}">

{% csrf_token %}

<textarea name="code" placeholder="Describe the program you want to generate..." required>{{ code }}</textarea>

<br><br>

<select name="language" required>
<option value="">Select Language</option>
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
<option value="java">Java</option>
<option value="c">C</option>
<option value="c++">C++</option>
</select>

<br><br>

<button type="submit">Generate Code</button>

</form>

{% if results %}

<div class="result-box">
<pre>{{ results }}</pre>
</div>

{% endif %}

</div>

</section>

</body>
</html>
