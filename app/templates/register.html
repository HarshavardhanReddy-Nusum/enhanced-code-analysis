<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <meta name="description" content="Your description">
    <meta name="author" content="Your name">

    <meta property="og:site_name" content="" />
    <meta property="og:site" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:card" content="summary_large_image">

    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/fontawesome-all.min.css" rel="stylesheet">
    <link href="/static/css/aos.min.css" rel="stylesheet">
    <link href="/static/css/swiper.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">

</head>

<body>

    <nav id="navbar" class="navbar navbar-expand-lg fixed-top navbar-dark" aria-label="Main navigation">
        <div class="container">

            <a class="navbar-brand logo-text" href="{% url 'index' %}">Enhanced Code Analysis and Feedback System</a>

            <button class="navbar-toggler p-0 border-0" type="button" id="navbarSideCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="navbar-collapse offcanvas-collapse">
                <ul class="navbar-nav ms-auto navbar-nav-scroll">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'index' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'about' %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'register' %}">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>


    <section class="contact d-flex align-items-center py-5" id="contact">
        <div class="container-fluid text-light">
            <div class="row">

                <div class="col-lg-6 d-flex justify-content-center justify-content-lg-end align-items-center px-lg-5">
                    <div style="width:90%">

                        <div class="text-center text-lg-start py-4 pt-lg-0">
                            <p>SIGN-UP</p>
                            <h2 class="py-2">Registration Form</h2>
                        </div>

                        <div>

                            <!-- YOUR ORIGINAL FORM (UNCHANGED) -->
                            <form action="{% url 'register' %}" method="post">
                                {% csrf_token %}
                                <div class="form-group py-2">
                                    <select class="form-control" name="user_type">

                                        <option value="">Select User Type</option>
                                        <option value="Student">Student</option>
                                        <option value="Developer">Developer</option>

                                    </select>
                                </div>
                                <div class="row">
                                    <div class="col-lg-6">
                                        <div class="form-group py-2">
                                            <input type="text" class="form-control form-control-input" name="name"
                                                placeholder="Enter name">
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group py-2">
                                            <input type="email" class="form-control form-control-input" name="email"
                                                placeholder="Enter Email ID">
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-lg-6">
                                        <div class="form-group py-2">
                                            <input type="password" class="form-control form-control-input"
                                                name="password" placeholder="Enter Password">
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group py-2">
                                            <input type="password" class="form-control form-control-input"
                                                name="confirm_password" placeholder="Enter Confirm Password">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group py-2">
                                    <textarea class="form-control form-control-input" rows="6" name="address"
                                        placeholder="Address"></textarea>
                                </div>

                                <div class="my-3">
                                    <button type="submit" class="form-control form-control-input">Register</button>
                                </div>
                            </form>


                            <!-- OTP FORM (ONLY SHOWS AFTER REGISTER) -->
                            {% if otp_sent %}

                            <hr style="margin-top:30px">

                            <h4 style="color:white;">OTP Verification</h4>

                            <form action="{% url 'register' %}" method="post">
                                {% csrf_token %}

                                <div class="form-group py-2">
                                    <input type="text" name="otp" class="form-control form-control-input"
                                        placeholder="Enter OTP sent to your email">
                                </div>

                                <div class="my-3">
                                    <button type="submit" class="form-control form-control-input">Verify OTP</button>
                                </div>

                                <p id="otp-timer">OTP expires in: 02:00</p>
                            </form>
                            <form method="POST">
                                {% csrf_token %}

                                <input type="hidden" name="resend_otp" value="1">

                                <button type="submit" class="btn btn-warning">
                                    Resend OTP
                                </button>

                            </form>

                            <br><br><br><br>

                            {% endif %}

                        </div>

                    </div>
                </div>

                <div class="col-lg-6 d-flex align-items-center">
                    <img class="img-fluid d-none d-lg-block" src="/static/assets/images/contact.jpg" alt="contact">
                </div>

            </div>
        </div>
    </section>


    <script>
        {% if messages %}
        {% for msg in messages %}
        alert('{{ msg }}');
        {% endfor %}
        {% endif %}
    </script>

    <script>

        var timeLeft = 120;

        var timer = setInterval(function () {

            var minutes = Math.floor(timeLeft / 60);
            var seconds = timeLeft % 60;

            document.getElementById("otp-timer").innerHTML =
                "OTP expires in: " + minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);

            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(timer);
                document.getElementById("otp-timer").innerHTML = "OTP Expired";
            }

        }, 1000);

    </script>

    <script src="/static/js/bootstrap.min.js"></script>
    <script src="/static/js/purecounter.min.js"></script>
    <script src="/static/js/swiper.min.js"></script>
    <script src="/static/js/aos.js"></script>
    <script src="/static/js/script.js"></script>

</body>

</html>
